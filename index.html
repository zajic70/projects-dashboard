né 2026-05-29.\r\nHotové věci jsou v Gitu a popsané v `CLAUDE.md`. Tento soubor drží **otevřené body**.\r\n\r\n---\n\n## 🟠 Bezpečnost — zbývá z auditu\r\n\n### #3 Reset hesla e-mailem (středně velké) — ⚠️ BLOKÁTOR PŘED PRODUKCÍ\r\n\nAktuálně `ResetPasswordPresenter::requestFormSucceeded` zobrazí reset token přímo ve flash\r\nzprávě (`\/\/ DOČASNĚ: bez e-mailu`). Token je tak viditelný v HTML — nepřijatelné v produkci.\r\n`handleGenerateResetLink` (admin funkce) flash záměrně ponecháme, to je OK.\r\n\r\n`nette\/mail` je v composeru, jen není nakonfigurovaný.\r\n\r\nKroky před nasazením:\r\n1. `config\/local.neon` — přidat SMTP (nebo `sendmail`):\r\n   ```neon\r\n   mail:\r\n       smtp: true\r\n       host: smtp.vas-server.cz\r\n       port: 587\r\n       username: ...\r\n       password: ...\r\n   ```\r\n2. `app\/Service\/PasswordResetMailer.php` — service přijímá `Nette\\Mail\\Mailer`, posílá mail\r\n3. `app\/Presentation\/Auth\/ResetPassword\/email.latte` — šablona mailu s odkazem\r\n4. `config\/services.neon` — zaregistrovat `PasswordResetMailer`\r\n5. `ResetPasswordPresenter::requestFormSucceeded` — nahradit DEMO flash voláním maileru;\r\n   flash vždy jen „Pokud e-mail existuje, byl odeslán odkaz\" (ochrana před enumerací)\r\n6. Throttling (5 \/ 15 min \/ IP) zůstává beze změny\r\n\r\n---\n\n## 🛠 Refaktoring SCSS \/ Bootstrap\r\n\n### `@use bootstrap with (...)` — čistá propagace proměnných\r\n\nAktuálně `@use 'bootstrap\/scss\/bootstrap';` bez konfigurace → SCSS overrides\r\n**neprostupují** do Bootstrapu (`--bs-primary`, `--bs-body-color`… zůstávají\r\ndefault). Workaround je `:root` override na konci `main.scss`. Čistě by to bylo:\r\n```scss\r\n@use 'bootstrap\/scss\/bootstrap' with (\r\n    $primary: #A8C5D6,\r\n    $secondary: #C8CFD6,\r\n    $success: #B6E6A1,\r\n    ...\r\n    $body-color: #4a5663,\r\n    $body-bg: #fafbfc,\r\n);\r\n```\r\nPak by `--bs-primary` i `.btn-primary` rovnou používaly naši paletu a `:root` override\r\nse dá odstranit. Riziko: některé naše use Sass funkce (`darken($primary, 25%)`)\r\nmimo `@use` blok by potřebovaly upravit (musely by přijít z `bootstrap.$primary`).\r\n\r\n---\n\n## 🧪 Testy (chybí)\r\n\n- **`UzivatelFirmaRepository`** — `findOrg0Vazba`, `findFirmyProUzivatele`, `findVsechnyVazby`\r\n- **`AktivniFirmaService`** — klíčová logika `vstup()` (switch-down pro interní v zákaznické firmě, ověření přístupu pro zákazníka)\r\n- **`Role`** — `uroven`, `jeInterni`, `nizsiNez`\r\n- **Integration: login flow** — interní → org 0; zákazník 1\/2+ firem; vstup do firmy bez práv → 403\r\n- **AdminPresenter::povoleneRole** — pravidlo úrovní (obchodnik_admin nesmí přidat obchodnik_admin)\r\n\r\nTest fixtures jsou v `tests\/fixtures\/db_stubs.php` (`FakeExplorer`\/`FakeSelection`\/`FakeActiveRow`).\r\n\r\n---\n\n## 🏪 Obchodní data — scope filtering podle aktivní firmy\r\n\nPermission říká **CO** se smí, **KTEROU firmu** drží `AktivniFirmaService::getFirmaId()`.\r\nAž přijdou skutečné CRUD moduly (objednávky, faktury, sklad, dodací listy):\r\n\r\n- Repository metody přijímat `$firmaId` jako parametr a filtrovat\r\n- Pro **obchodníka** (interní v org 0) ukázat objednávky **všech** firem (cislo_organizace != 0)\r\n- Pro **zákazníka** jen jeho aktivní firmy\r\n- Helper: `AktivniFirmaService::getCisloOrganizace() === 0` → obchodník zobrazuje agregát\n\n## 📦 CRUD moduly (placeholdery → implementace)\r\n\n- **Doklady**: Faktury (zakaznik+), Dodací listy, Sklad (zakaznik_admin+)\r\n- **Obchod**: Objednávky (zakládá zakaznik, edituje obchodnik), Produkty katalog, Zákazníci (správa)\r\n- Vždy s `#[RequirePermission]` (Resource už existují)\r\n\r\n---\n\n## 🎨 Drobnosti \/ nice-to-have\r\n\n### Validace délky raw POST vstupů v AdminPresenter\r\n\nHandle* signály čtou texty přímo z `$req-\u003EgetPost()` bez limitu délky — útočník může\r\nposlat megabyte dat a zbytečně zatížit DB. Přidat kontrolu po `trim()`:\r\n\r\n```php\r\n\/\/ helper do AdminPresenter nebo base třídy:\r\nprivate function postText(string $key, int $max = 1000): string\r\n{\r\n    $val = trim((string) $this-\u003EgetHttpRequest()-\u003EgetPost($key, ''));\r\n    return mb_substr($val, 0, $max);\r\n}\r\n```\r\n\r\nDotčená místa a doporučené limity:\r\n| Signál \/ metoda | Pole | Max |\r\n|---|---|---|\r\n| `handleSaveTranslation` | cs, en, de | 1 000 |\r\n| `handleSaveZprava` | text_cs, text_en, text_de | 1 000 |\r\n| `getClanekFormData` | titulek_cs\/en\/de | 500 |\r\n| `getClanekFormData` | perex_cs\/en\/de | 1 000 |\r\n| `getClanekFormData` | obsah | 50 000 |\r\n\r\n---\r\n\r\n- **Audit #5 — i ve flash:** flash messages stále `|noescape` (app-generovaný kontent, OK).\r\n  Reset-link flash uživatelská data escapuje (`htmlspecialchars`). Pokud někdo přidá flash\r\n  s neescapovaným uživatelským vstupem → riziko XSS.\r\n- **Hra 2048 \/ Pexeso** — pokud feature flag vypnutý, položka v menu skrytá + akce vrací 404.\r\n  Možná stojí za to mít centrální helper `requireFeature('pexeso')` místo inline `$this-\u003Eerror`.\r\n- **Sidebar brand text** ukazuje název workspace; možnost přidat název firmy malým písmem.\r\n- **Pravidlo úrovní** se dnes vynucuje jen v `AdminPresenter::handleAddUzivatelFirma`.\r\n  Pro úplnost přidat i do FirmaAdmin (zakaznik_admin nesmí editovat sebe \/ cizí firmu — sebe-edit už hlídá `assertNotSelf`).\r\n\r\n---\n\n## 🚀 Pracovní postup v novém vlákně\r\n\n1. Přečti **`CLAUDE.md`** — pravidla a architektura.\r\n2. Přečti tento **`todo.md`** — co je otevřené.\r\n3. Přečti **`docs\/prava.md`** — matice oprávnění.\r\n4. MSSQL je dostupný přes MCP server `mssql` (auto-připojení při startu Claude Code).\r\n   Lze rovnou: `mcp__mssql__mssql_execute_query` pro dotazy\/migrace.\r\n5. Repo: `Zajic70\/B2BTest_VM` (GitHub), branch `master`.\n\n\n---\n\n## Projekt: `cateye`\n_Soubor: `cateye\\todo.md`_\n\n# TODO – cateye projekt\n\n## 🆕 Sjednotit dokumentaci do `docs\/` (dle globálního CLAUDE.md)\n\n- [ ] Úkoly veď v `docs\/todo.md`, hotové v `docs\/changelog.md` — názvy souborů malými písmeny :**\n1. CSRF doplnění v signálech (~30 min)\n2. SMTP heslo do `local.neon` (~15 min)\n3. MIME check uploadu (~20 min)\n4. Ecomail API klíč z `common.neon` → `local.neon` (~10 min)\n\n**Větší úkoly samostatně:**\n- MD5 → bcrypt (vyžaduje migraci s fallbackem — podle plánu v CLAUDE.md)\n- God model split (`ProdejModel` → 5 services)\n- `BasePresenter::startup()` refactor (461 řádků)\n\n---\n\n## 🔴 Prioritní\n\n### Bezpečnost — kritické\n\n- [ ] **CSRF: chybějící ochrana v handle signálech** — přidat `isMethod('POST')` + `verifyCsrfToken()`:\n  - `SystemPresenter.php` → `handleKosikVIPZapVyp()`, `handleKosikVIPParam()`\n  - `System\\RedakcePresenter.php` → `handleZmenSirkuObsahuCl()`, `handleSmazObsahCl()`, `handlePridejObsahCl()`, `handleZmenPoradiObsahCl()`\n  - `Prodej\\BasePresenter.php` → `handleVymazKosikOpravdu()`, `handleSmazKosikOpravdu()`, `handleKosikzmen()`\n  - `Guest\\HomepagePresenter.php` → `handlePridejIP()`\n- [ ] **MD5 hesla** — nahradit `md5()` za `password_hash()` \/ Nette `Passwords` (`Authenticator.php:35,146`)\n  - Postup: nový sloupec `passw_bcrypt`, fallback ověření, redirect na změnu hesla\n- [ ] **SQL injection** — `ProdejModel.php:1547` — dynamický `implode()` přímo do SQL → parametrizovat\n\n### Bezpečnost — vysoké\n\n- [ ] **Hardcoded SMTP heslo** → `local.neon` (`Guest\\BasePresenter.php:79`, `Prodej\\BasePresenter.php`)\n- [ ] **Ecomail API klíč** z `common.neon` (trackován gitem) → `local.neon`\n- [ ] **Upload — jen přípona, ne MIME** — kontrola skutečného MIME typu (`SystemPresenter.php:298` — `handleUploadPriloha`)\n- [ ] **Upload složka bez ochrany** — `web.config` do `\/www\/redakce\/` (zákaz spouštění skriptů na IIS)\n- [ ] **IP rate limiting** — `Guest\\BasePresenter::startup()` → `checkIpAccess()`:\n  blokovat IPs z `iplog`, \u003E60 req\/min přes Cache → eskalace do `iplog(1)`\n\n### Architektura — kritické\n\n- [ ] **God model `ProdejModel`** (~1 500 řádků, ~470 metod) — rozdělit na služby:\n  `CartService`, `OrderService`, `I   changelog: "# Changelog — souhrnný přehled — vygenerováno 2026-06-09 15:03\n\nProjektů s changelogem: **4**\n\n📋 [TODO přehled](https:\/\/gist.github.com\/zajic70\/1b2c3570dc33e6ad8ebc0d6a759e7b02)\n\n---\n\n## Projekt: `B2B`\n_Soubor: `B2B\\CHANGELOG.md`_\n\n# Changelog — B2B\n\n\u003E Nejnovější nahoře. Otevřené body → `todo.md`. Workflow: úkol vznikne v `todo.md`, po dokončení se přesune sem.\n\n---\n\n## 2026-06-04 — Namespace refaktoring\n\n- `app\/Auth\/` → `app\/Model\/Auth\/` (namespace `App\\Model\\Auth`)\n- `app\/Translation\/` + `app\/Model\/TranslationStorage` → `app\/Model\/Translation\/` (namespace `App\\Model\\Translation`)\n- `app\/Service\/` → `app\/Model\/` (FeatureFlags, AktivniFirmaService — namespace `App\\Model`)\n- `app\/Service\/` adresář odstraněn\n- Sign-out: `\u003Ca n:href\u003E` → POST form + CSRF token\n- Session: `cookieSamesite: Lax` (Strict lámal POST→redirect login flow)\n- `AdminTemplate.php` — sdílená template třída pro BasePresenter type-hints\n- `@flash.latte` — extrahovaný sdílený flash JS\n- Testy: AuthorizationTest + AuthenticatorTest přepsány pro aktuální role model, všech 9 zelených\n\n---\n\n## 2026-05-28 — Design světlého motivu + dokumentace\n\n### Změny\n- **Levé menu světle šedé** místo tmavého — různé odstíny: rail `#dde1e6`, sidebar `#eef0f3`, text `#525860`, aktivní položka primary-tint + levý okraj `$primary`.\n- **Pozadí stránky téměř bílé** (`$body-bg` `#fafbfc`); `.admin-body` sjednoceno.\n- **Jemnější barva textu** (slate `#4a5663` místo téměř černé `#2c2c2e`) — lépe sedí ke světlému motivu.\n- **Hamburger toggle** natvrdo tmavý (sjednoceno mobil + desktop).\n\n### Opravy\n- **`@use bootstrap` sandboxuje SCSS proměnné** — `:root` override `--bs-body-color`, `--bs-emphasis-color`, `--bs-primary` po importu Bootstrapu (jinak Bootstrap utility používají defaultní paletu, ne naši).\n\n### Dokumentace\n- `CLAUDE.md`: doplněn modal-xl pattern, světlé schéma menu, gotchas (lang() + ActiveRow, @use bootstrap), save fallback EN\/DE → CS.\n- Nový `todo.md` (otevřené body, postup pro novou session).\n\n---\n\n## 2026-05-21 — Multi-firma model + bezpečnostní audit + vícejazyčný obsah\n\nNejvětší architektonická změna v projektu.\n\n### Přidáno — Per-firma model rolí (5 úrovní)\n- Junction tabulka `uzivatel_firma`, `firmy.cislo_organizace` (org 0 = provozovatel).\n- 5 rolí ve dvou větvích: `zakaznik` → `zakaznik_admin` \/ `obchodnik` → `obchodnik_admin` → `superadmin`.\n- `App\\Security\\Role` (konstanty + `uroven()`, `jeInterni()`, `nizsiNez()`).\n- `AktivniFirmaService` — drží aktivní firmu v session, počítá efektivní roli (`vstup`, `vstupDleCisla`, `firmyProPrepnuti`, switch-down pro interní v cizí firmě).\n- `UzivatelFirmaRepository` (vazby, role v org 0), `FirmyRepository::findOrg0\/findZakaznickeFirmy\/findByCisloOrganizace`.\n- `BasePresenter::applyEffectiveRoles` — per-request nastaví identitě efektivní roli.\n- Workspace **Moje firma** (`FirmaAdmin`) — správa uživatelů firmy pro `zakaznik_admin+`.\n- Presenter `Firma:vyber` — výběr firmy (cards + zadání čísla organizace s autofocus).\n- Topbar **indikátor aktivní firmy**: 🏠 org 0 \/ 👓 alias (amber pill) \/ běžný zákazník (bez ikony) + číslo v závorce.\n- Admin → Uživatelé → správa firem uživatele v modal-xl (5 rolí v selectu, pravidlo úrovní).\n- Migrace 007–010 (firmy, junction, role rename, drop `uzivatele.role`).\n\n### Přidáno — Top zprávy a Články (vícejazyčné)\n- Tabulky `top_zpravy` (banner pruhy pod topbarem) a `clanky` (aktuality).\n- Admin CRUD: modal pro zprávy, modal-xl pro články (offcanvas → modal po designovém požadavku).\n- Vícejazyčný obsah: `text_cs\/en\/de`, `titulek_cs\/en\/de`, `perex_cs\/en\/de` (obsah článku jednojazyčný).\n- Latte funkce `{lang($row, 'titulek', $locale)}` — výběr sloupce dle jazyka, fallback na CS.\n- Save fallback: prázdné EN\/DE pole se uloží jako český text.\n- Top zprávy se zobrazují jako sticky banner pod topbarem (sanitizováno přes `|safehtml`).\n- Migrace 006, 013.\n\n### Přidáno — UI pomocníci (deklarativní menu)\n- `BasePresenter::item()`, `group()`, `workspace()` — tovární metody pro menu\/záložky.\n- Menu se sestavuje jako čitelný seznam, filtrování práv jedním `array_filter`.\n\n### Změněno\n- Workspace **Doklady** dostal `#[RequirePermission]` (faktury = `Faktury.View`, sklad = `Sklad.View`) — díra audit #2.\n- Workspace **Obchod**: doplněno `#[RequirePermission]` na `renderObjednavky\/Produkty\/Zakaznici` (přímý URL dříve obcházel skrytí v menu).\n- Edit UI: **modal-xl** místo offcanvasu\/fullscreen pro články, top zprávy a správu firem uživatele.\n- Z-index modalů: `.modal: 1600`, `.modal-backdrop: 1550` — nad rail (1100) i hamburger (1500).\n\n### Bezpečnost (audit fixes)\n- **#1** Per-firma role se reálně **vynucuje** přes efektivní roli per-request.\n- **#2** Doklady chráněné `#[RequirePermission]`.\n- **#4** Tracy debug **jen z localhostu** (`setDebugMode(['127.0.0.1', '::1'])`).\n- **#5** Top zprávy přes Latte filtr `|safehtml` (whitelist tagů bez atributů) místo `|noescape`.\n- **#6** Přepínání jazyka **POST + CSRF** (`handleSetLocale` + Latte formuláře s `_token`).\n- **#7** Mrtvý kód `UserRepository::findByFirmaId` odstraněn (sloupec již neexistuje).\n- **#8** Ochrana proti úpravě\/odebrání **sebe sama** ve `FirmaAdminPresenter`.\n\n### Opravy\n- `lang()` Latte funkce čte přes `$row-\u003E{$sloupec}` (property access) — `(array)` cast u Nette `ActiveRow` vrací zmršené klíče.\n- Migrace 010 fix: `INFORMATION_SCHEMA` sloupec se jmenuje `kod`, ne `klic`.\n\n### Dokumentace\n- Nový `docs\/prava.md` — matice oprávnění (role × resource) vč. dědičnosti a hry\/feature flagy.\n- Nový `docs\/ALIAS.md` — popis alias mechanismu (impersonation pattern), přenositelný do jiných projektů.\n- `CLAUDE.md` přepsán na nový role model.\n\n---\n\n## 2026-05-19 — Workspaces, side rail, mobil + třetí jazyk (DE)\n\n### Přidáno\n- **Workspaces** (3 top-level kontexty): Nákup \/ Doklady \/ Nastavení.\n- **Side rail** (Slack\/Linear styl) — úzký levý sloupec s ikonami workspaces, vedle něj sidebar.\n- **Mobil drawer** (Gemini styl): rail i sidebar mimo viewport, hamburger v topbaru je vysune jako overlay s backdropem; topbar zůstává nad drawerem.\n- **Hamburger toggle** v kruhu (40×40) `position: fixed; top:8; left:8` — sjednoceno pro mobil i desktop.\n- **Třetí jazyk: němčina (DE)** — `Translator::Locales = ['cs','en','de']`, sloupec `de` v `preklady`, lokale dropdown vpravo v topbaru.\n- **Hry: Pexeso + 2048** — selektor velikosti 4×4 \/ 6×6 \/ 8×8 (persist v `localStorage`), best score per velikost u 2048, swipe support na mobilu, sjednocený design, feature flagy `pexeso` a `hra_2048`.\n- B2B logo v sidebaru jako odkaz na nástěnku.\n\n### Změněno\n- **Editor překladů**: Save tlačítko se zobrazí jen při změně, `beforeunload` zámek proti odchodu s neuloženými změnami.\n- Sidebar group toggle: dynamické chevrony místo hamburgeru.\n\n---\n\n## 2026-05-18 — Role\/oprávnění, feature flags, vícejazyčnost (EN), testy\n\n### Přidáno\n- **Role & oprávnění** přes `Nette\\Security\\Permission` — `App\\Security\\AuthorizationFactory` + atribut `#[RequirePermission(Resource::X, Privilege::Y)]` na presenter metodách (vyhodnocuje `PublicPresenter::checkRequirements`).\n- **Feature flags** — DB tabulka + service s per-request cache, admin UI s toggle tlačítky.\n- **Vícejazyčnost (CS \/ EN)** — translator z NEON souborů, DB tabulka `preklady` jako zdroj pravdy, export DB → NEON jedním kliknutím, Latte syntax `{_'klic'}`.\n- **Testy** Nette Tester: Authenticator, LoginThrottler, SecurityLogger, UserRepository, LoginAttemptRepository, TranslationStorage, CsrfProtection, AuthorizationFactory, Translator.\n\n### Změněno\n- Sjednocené menu sidebaru + bezpečnostní vylepšení (CSRF tokeny napříč).\n\n---\n\n## 2026-05-15 až 2026-05-17 — Základ projektu\n\n### Přidáno\n- **Stack**: PHP 8.5 + Nette 3.3 + Latte 3.x + MSSQL (sqlsrv), IIS + FastCGI.\n- **Bezpečné přihlášení**: email + heslo s `password_verify`, timing-attack ochrana (dummy hash), per-(IP, email) throttling (10\/30 pokusů za 10 min).\n- **Reset hesla**: jednorázový token (SHA-256 v DB, plaintext v URL, platnost 1 h), rate-limit 5 \/ 15 min \/ IP.\n- **Security log**: JSON Lines do `log\/security.log` (LOCK_EX atomický zápis).\n- **CSRF ochrana**: `CsrfProtection`, `requirePostWithCsrf()` v `PublicPresenter`.\n- **Admin modul** (správa uživatelů, generování reset linku), **Obchod modul** (placeholder).\n- **Pastelové schéma** (Bootstrap přepisy): `$primary` `#A8C5D6`, `$dark` `#3A4651` slate, font Plus Jakarta Sans.\n- Bezpečnostní audit + první sada testů Auth vrstvy.\n\n---\n\n## Architektonické gotchas — naučeno během vývoje\n\n- **Nette parametr `id` v signálech**: optional path segment → query string `?id=3` se zahodí. Pojmenuj parametr jinak (`$userId`) nebo posílej v POST body.\n- **Latte translation v ternárech**: `{$x ? _('a') : _('b')}` ❌ — `_()` nelze volat jako PHP funkci uvnitř výrazu. Použij `{if $x}{_'a'}{else}{_'b'}{\/if}`.\n- **Nette ActiveRow + `(array)` cast**: data jsou v privátní property, cast vrátí zmršené klíče. Použij `$row-\u003E{$sloupec}` (přes `__get`).\n- **`@use 'bootstrap\/scss\/bootstrap'` (bez `with`)**: sandboxuje SCSS proměnné — Bootstrap utility neuvidí naši paletu. Workaround `:root` override.\n- **Child presenter + `#[Inject]` z BasePresenter**: nesmí redeklerovat v konstruktoru (PHP error „Cannot redeclare property\"). Použij zděděné `$this-\u003E...`.\n- **Modal vs side rail z-index**: rail (1100) i hamburger (1500) jsou nad default modalem (1055). Nutný override `.modal: 1600 \/ .modal-backdrop: 1550`.\n- **sqlcmd UTF-8**: VŽDY `-f 65001`, jinak se zkomolí čeština.\n- **Session `cookieSamesite: Strict`** lámal POST → redirect login flow (cookie se neposlala při cross-site redirectu). Použij `Lax`.\n\n---\n\n## Repo\n\n[Zajic70\/B2BTest_VM](https:\/\/github.com\/Zajic70\/B2BTest_VM)\n\n\n---\n\n## Projekt: `cateye`\n_Soubor: `cateye\\CHANGELOG.md`_\n\n# Changelog — cateye\n\n\u003E Nejnovější postavit nové „rychlé řádkové\" zobrazení `prehledzbozi2`.\n\n### Architektura (`app\/model\/Zbozi\/`)\n- **`ZboziRepository`** (`*Repository` doplněno do auto-discovery v `config\/services.neon`) — DI `Connection $database`, vlastní `Cache($storage, 'zbozi')`.\n- **DTO** (`app\/model\/Zbozi\/Dto\/`, typed `readonly`, `fromRow(Row): self`):\n  - `Cismat` — master data (regcis, názvy, barva, velikost, mj, baleni, obrazek, ean13, idsortiment, idbabicka, idmaminka, znacka, jekolo, tagy, rgb1-3, highlight, poznzak, novinka, popis, koddph, sleva1, idvobcismat, prodejpobal, jenpobal, vobpocpol, limitks1, limitmoc1, **vypkosikbiz**)\n  - `Cena` — ceník per cenik vč. měny (moc, voczakl, vocmax, sleva, clo, vocvip…)\n  - `SlevaOrg` — slevový overlay org `[id =\u003E {sleva, bereto}]`\n  - `Sklad` — skladový stav (stavskl, stavtxt, stavkod, datumprichodu, dispo, **kosikdisableSklad** = view kosikdisable)\n  - `Expedak` — aktivní objednávky (objednanocelkem, lzedodat, nezamluveno, jinichteji…)\n  - `Kosik` — stav v košíku (kosikmnoz, idvobal, chybavobtxt, jechybavob, typKosik)\n  - `Vobaleni` — VOB balení (maxslevavob, vobzkrt)\n  - `DoplSoub` — obrázky\/soubory k výrobku (detail)\n- **enum `KosikDuvod`** (int): Lze=0, BezCeny=1, KolaBezPrava=2, KolaNikdo=3, Neodebira=4, NedostupneBiz=5, NeniSkladem=6 + `popis()` → překladový klíč `messages.prodej.*`\n\n### Loadery (ZboziRepository)\n| metoda | cache | klíč \/ pozn. |\n|--------|-------|--------------|\n| `nactiCismatVse(lang)` | ✅ tag `zbozi`, 24h | `cismat_vse_{lang}` — celý katalog (~2285 zobrazprodej=1) |\n| `nactiCenikVse(cenik)` | ✅ | `cenik_{cenik}` — **JOIN na zobrazprodej=1** (jinak 19727 řádků → memory!) |\n| `nactiSlevyOrg(cisloorg, cenik, crad)` | ✅ tagy `zbozi` + `slevyorg_{cisloorg}` | overlay `[id=\u003E{sleva,bereto}]`; cenik0→u3Slevy(crad,crcm), cenik\u003E0→u3SlevyZahr(k1puv,cisloorg) |\n| `nactiSklad(lang, sortId)` | ❌ živě | z view, filtr na sortiment |\n| `nactiExpedaky(cisloorg, lang)` | ❌ živě | u3ExpedakyAktivKZ |\n| `nactiKosik(idkosikhl)` | ❌ živě | **přímo tabulka `kosik`** (NE drahé view u3KosikRd) |\n| `nactiOblibene(iduzivfirma)` | ✅ tag `oblibene_{iduzivfirma}` | invalidace při kliknutí hvězdičky (`handleOblibenzmen`) |\n| `nactiVobaleni()` | ✅ tag `zbozi` | `[idvob =\u003E Vobaleni]` |\n| `nactiDoplSoub(lang)` | ✅ tag `zbozi` | `[idmaminka =\u003E DoplSoub[]]` |\n| `nactiSouvisejici(lang)` | ✅ tag `zbozi` | `[idbabicka =\u003E idvazba[]]` |\n| `invalidujSlevyOrg(cisloorg)` | — | volá Guest login (po `$user-\u003Elogin()`) |\n| `invalidujOblibene(iduzivfirma)` | — | volá `handleOblibenzmen` |\n\n### `nactiProdukty(lang, cenik, cisloorg, crad, jeeu, muzekola, iduzivfirma, idkosikhl, sortId)`\nSloučí všechny zdroje do **plochého `stdClass`** (názvy polí = jako stará šablona → drop-in). Dopočítá:\n- ceny po slevě + clo (voc, vocbezdph, vocmax…, obchprirazka, vocvobbezdph), clo jako % (parita s getZboziPolozky `$cloproc`), sleva1 negovaná\n- `kosikdisable` + `kosikdisableduvod` (priorita: vypkosikbiz → kola → bereto → bez ceny → není skladem)\n- VOC schované jen u „nesmí objednat\" (NE u „není skladem\")\n- `oblibenestav`, počty `pocetDoplSoub`\/`pocetSouvis`, `vicMaminek` (babička má 2+ maminky)\n- **cisloorg=0 (alias\/interní)**: bere vše, sleva vždy 0\n- **filtr**: produkt se nevrátí, když není skladem + košík zakázán + nic na expedákách (nezamluveno=0, lzedodat=0) ani v košíku\n\n### Zobrazení `prehledzbozi2.latte` (kartičkové řádky)\n- **Grupování**: babička (vnější `iterateWhile` dle idbabicka) → karty maminek → varianty\/velikosti (vnitřní `iterateWhile` dle idmaminka, košíky pod sebou)\n- Maminka = karta `ag-radek-bila` (rámeček + stín, hover lift); babička = **levý zelený proužek** (`border-left:4px #449b14`) jen pro 2+ maminky\n- Sloupce: foto · produkt (hvězda+regcis, název, **rgb pecka** + barva·značka, počty souvis\/obrázků) · **MOC** · **VOC** (+sleva\/clo) · řádky velikostí: [exped. nez+dod] [sklad·velikost] [košík]\n- Košík funkční přes `tlacitk let activeTab = 'todo';

function render(tab) {
  activeTab = tab;
  document.querySelectorAll('#mainTab .nav-link').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.getElementById('content').innerHTML = marked.parse(DATA[tab]);
}
