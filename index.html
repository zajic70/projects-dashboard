= trim((string) $this-\u003EgetHttpRequest()-\u003EgetPost($key, ''));\n    return mb_substr($val, 0, $max);\n}\n```\n\nDotčená místa a doporučené limity:\n| Signál \/ metoda | Pole | Max |\n|---|---|---|\n| `handleSaveTranslation` | cs, en, de | 1 000 |\n| `handleSaveZprava` | text_cs, text_en, text_de | 1 000 |\n| `getClanekFormData` | titulek_cs\/en\/de | 500 |\n| `getClanekFormData` | perex_cs\/en\/de | 1 000 |\n| `getClanekFormData` | obsah | 50 000 |\n\n### A3. Pravidlo úrovní i ve FirmaAdmin\n\nPravidlo úrovní se dnes vynucuje jen v `AdminPresenter::handleAddUzivatelFirma`.\nPro úplnost přidat i do FirmaAdmin (zakaznik_admin nesmí editovat sebe \/ cizí firmu —\nsebe-edit už hlídá `assertNotSelf`).\n\n---\n\n## B. Refaktoring\n\n### B1. SCSS: `@use bootstrap with (...)` — čistá propagace proměnných\n\nAktuálně `@use 'bootstrap\/scss\/bootstrap';` bez konfigurace → SCSS overrides\n**neprostupují** do Bootstrapu (`--bs-primary`, `--bs-body-color`… zůstávají\ndefault). Workaround je `:root` override na konci `main.scss`. Čistě by to bylo:\n```scss\n@use 'bootstrap\/scss\/bootstrap' with (\n    $primary: #A8C5D6,\n    $secondary: #C8CFD6,\n    $success: #B6E6A1,\n    ...\n    $body-color: #4a5663,\n    $body-bg: #fafbfc,\n);\n```\nPak by `--bs-primary` i `.btn-primary` rovnou používaly naši paletu a `:root` override\nse dá odstranit. Riziko: některé naše use Sass funkce (`darken($primary, 25%)`)\nmimo `@use` blok by potřebovaly upravit (musely by přijít z `bootstrap.$primary`).\n\n### B2. Centrální helper `requireFeature()`\n\nHra 2048 \/ Pexeso — pokud feature flag vypnutý, položka v menu skrytá + akce vrací 404.\nMožná stojí za to mít centrální helper `requireFeature('pexeso')` místo inline `$this-\u003Eerror`.\n\n---\n\n## C. Testy (chybí)\n\n1. **`UzivatelFirmaRepository`** — `findOrg0Vazba`, `findFirmyProUzivatele`, `findVsechnyVazby`\n2. **`AktivniFirmaService`** — klíčová logika `vstup()` (switch-down pro interní v zákaznické firmě, ověření přístupu pro zák let activeTab = 'todo';

function render(tab) {
  activeTab = tab;
  document.querySelectorAll('#mainTab .nav-link').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.getElementById('content').innerHTML = marked.parse(DATA[tab]);
}

document.querySelectorAll('#mainTab .nav-link').forEach(btn => {
  btn.addEventListener('click', () => render(btn.dataset.tab));
});

// Přidáme emoji filtry k prioritní tabulce
marked.use({
  renderer: {
    table(header, body) {
      return '<div class="table-responsive"><table class="table table-sm table-bordered table-hover">'
           + '<thead>' + header + '</thead><tbody>' + body + '</tbody></table></div>';
    }
  }
});

// Ochrana heslem
(function() {
  const KEY = 'pd_auth';
  if (sessionStorage.getItem(KEY) === '1') return;
  const pwd = prompt('Heslo:');
  if (pwd === 'necum') {
    sessionStorage.setItem(KEY, '1');
  } else {
    document.body.innerHTML = '';
    location.href = 'https://google.com';
  }
})();

render('todo');
